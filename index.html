    const todayKey = () => new Date().toISOString().slice(0,10);
    function useLS(key, init) {
      const [v, setV] = useState(() => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch{return init;} });
      useEffect(() => { try{localStorage.setItem(key,JSON.stringify(v));}catch{} }, [key,v]);
      return [v,setV];
    }

    function Ring({value,max,size=110,sw=11,color,children}) {
      const r=(size-sw)/2, circ=2*Math.PI*r, dash=Math.min(value/max,1)*circ;
      return (
        <div style={{position:"relative",width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width={size} height={size} style={{position:"absolute",transform:"rotate(-90deg)"}}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={sw}/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
              strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
              style={{transition:"stroke-dasharray .5s cubic-bezier(.4,0,.2,1)"}}/>
          </svg>
          <div style={{zIndex:1,textAlign:"center"}}>{children}</div>
        </div>
      );
    }

    function Bar({label,val,max,color,unit="g"}) {
      return (
        <div style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:11,color:"rgba(255,255,255,0.55)",fontWeight:700}}>{label}</span>
            <span style={{fontSize:11,color:"#fff",fontWeight:800}}>{Math.round(val)}<span style={{color:"rgba(255,255,255,0.3)"}}>/{max}{unit}</span></span>
          </div>
          <div style={{height:6,background:"rgba(255,255,255,0.08)",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min((val/max)*100,100)}%`,background:color,borderRadius:99,transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
          </div>
        </div>
      );
    }

    function Spark({data,color,h=44}) {
      if(!data||data.length<2) return <div style={{height:h,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"rgba(255,255,255,0.2)"}}>veri yok</div>;
      const mn=Math.min(...data)-0.5, mx=Math.max(...data)+0.5;
      const pts=data.map((v,i)=>`${(i/(data.length-1))*100},${h-((v-mn)/(mx-mn))*h}`).join(" ");
      const area=`M${pts.split(" ")[0]} L${pts} L100,${h} L0,${h} Z`;
      const uid=color.replace(/[^a-z0-9]/gi,"");
      return (
        <svg viewBox={`0 0 100 ${h}`} preserveAspectRatio="none" style={{width:"100%",height:h}}>
          <defs><linearGradient id={`sg${uid}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
          <path d={area} fill={`url(#sg${uid})`}/>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
    }

    function App() {

      const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2000); };

      const totals = meals.reduce((a,m)=>({cal:a.cal+m.cal,p:a.p+m.p,c:a.c+m.c,f:a.f+m.f}),{cal:0,p:0,c:0,f:0});

      const wHist  = wLog.slice(-10).map(w=>w.val);
      const C = {cal:"#ff6b6b",p:"#4ecdc4",c:"#ffd93d",f:"#a29bfe",w:"#74b9ff"};

      const addFood = food => {
        setMeals(m=>[...m,{...food,uid:Date.now(),mealType,time:new Date().toLocaleTimeString("tr",{hour:"2-digit",minute:"2-digit"})}]);

        if(!custom.name||!custom.cal) return;
        addFood({name:custom.name,cal:+custom.cal,p:+custom.p||0,c:+custom.c||0,f:+custom.f||0});
        setCustom({name:"",cal:"",p:"",c:"",f:""});
      };
      const addWater = ml => { setWater(w=>Math.min(w+ml,6000)); showToast(`💧 +${ml}ml`); };
      const addCustomWater = () => { const ml=parseInt(mlInput); if(!ml||ml<=0) return; addWater(ml); setMlInput(""); };

      const filtered = FOODS.filter(f=>(selCat==="Tümü"||f.cat===selCat)&&f.name.toLowerCase().includes(search.toLowerCase()));

      const card = (ex={}) => ({background:"rgba(255,255,255,0.053)",borderRadius:15,padding:"13px 13px",border:"1px solid rgba(255,255,255,0.07)",marginBottom:9,...ex});
      const inp  = (ex={}) => ({background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.11)",borderRadius:10,padding:"10px 12px",color:"#fff",fontSize:14,width:"100%",fontFamily:"inherit",outline:"none",boxSizing:"border-box",...ex});

        {id:"workout", label:"Antren", icon:"M6 4v16M18 4v16M6 9h12M6 15h12"},

          {/* HEADER */}
          <div style={{padding:`calc(10px + ${safeTop}) 14px 9px`,background:"linear-gradient(160deg,#13132a,#0c0c15)",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.38)",marginBottom:1}}>{new Date().toLocaleDateString("tr",{weekday:"long",day:"numeric",month:"long"})}</div>
                <div style={{fontSize:19,fontWeight:900,letterSpacing:"-0.3px"}}>Merhaba! 👋</div>

              <div style={{background:"linear-gradient(135deg,#a29bfe,#6c63ff)",borderRadius:11,padding:"5px 11px",textAlign:"center"}}>

                    <div style={{fontSize:16,fontWeight:900,lineHeight:1}}>{Math.round(totals.cal)}</div>

                    <Bar label="🍚 Karb"    val={totals.c} max={T.carbs}   color={C.c}/>
                    <Bar label="🥑 Yağ"     val={totals.f} max={T.fat}     color={C.f}/>
                  </div>
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:9}}>
                <div style={{...card({margin:0,cursor:"pointer",background:"rgba(116,185,255,.08)"}),display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 10px"}} onClick={()=>setTab("water")}>
                  <Ring value={water} max={T.water} size={70} sw={8} color={C.w}>
                    <div style={{fontSize:12,fontWeight:900}}>{(water/1000).toFixed(1)}L</div>
                  </Ring>
                  <div style={{marginTop:5,textAlign:"center"}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.w}}>Su</div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>{T.water/1000}L hedef</div>
                  </div>
                </div>
                <div style={{...card({margin:0,cursor:"pointer",background:"rgba(78,205,196,.07)"}),display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 10px"}} onClick={()=>setTab("weight")}>
                  <div style={{fontSize:28,fontWeight:900,color:C.p,lineHeight:1}}>{lastKg}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginBottom:4}}>kg</div>
                  <Spark data={wHist} color={C.p} h={34}/>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",marginTop:2}}>Son 10 gün</div>
                </div>
              </div>

              <div style={card()}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                  <div style={{fontSize:13,fontWeight:800}}>Bugünkü Öğünler</div>
                  <button style={btn("linear-gradient(135deg,#6c63ff,#ff6b6b)")} onClick={()=>setModal("food")}>+ Ekle</button>
                </div>
                {meals.length===0
                  ? <div style={{textAlign:"center",padding:"14px 0",color:"rgba(255,255,255,0.2)",fontSize:12}}>Henüz öğün yok 🍽️</div>
                  : meals.slice(-5).map(m=>(
                    <div key={m.uid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.name}</div>
                        <div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{m.mealType} · {m.time}</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:7,flexShrink:0}}>
                        <span style={{fontSize:12,fontWeight:800,color:C.cal}}>{m.cal}</span>
                        <button onClick={()=>setMeals(ms=>ms.filter(x=>x.uid!==m.uid))} style={{background:"rgba(255,107,107,.15)",border:"none",borderRadius:6,padding:"3px 7px",cursor:"pointer",color:C.cal,fontSize:11}}>✕</button>
                      </div>
                    </div>
                  ))
                }
              </div>

              <div style={card()}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                  <div style={{fontSize:13,fontWeight:800}}>Antrenman</div>
                  <button style={btn("rgba(162,155,254,.2)")} onClick={()=>setTab("workout")}>Detay</button>
                </div>
                {workouts.length===0
                  ? <div style={{textAlign:"center",padding:"10px 0",color:"rgba(255,255,255,0.2)",fontSize:12}}>Henüz egzersiz yok 🏋️</div>
                  : workouts.slice(0,3).map(w=>(
                    <div key={w.uid} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <span style={{fontSize:12,fontWeight:700}}>{w.name}</span>
                      <span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{w.sets&&`${w.sets}×${w.reps}`}{w.weight&&` · ${w.weight}kg`}</span>
                    </div>
                  ))
                }
              </div>
            </div>}

            {/* FOOD */}
            {tab==="food" && <div className="pg">
              <div style={card({padding:"9px 13px",marginBottom:9})}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",textAlign:"center",gap:2}}>
                  {[[C.cal,"🔥",Math.round(totals.cal),"kcal"],[C.p,"🥩",Math.round(totals.p)+"g","pro"],[C.c,"🍚",Math.round(totals.c)+"g","karb"],[C.f,"🥑",Math.round(totals.f)+"g","yağ"]].map(([c,ic,v,l])=>(
                    <div key={l}><div style={{fontSize:15}}>{ic}</div><div style={{fontSize:13,fontWeight:900,color:c}}>{v}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>{l}</div></div>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:9,overflowX:"auto",paddingBottom:2}}>
                {["Kahvaltı","Öğle","Akşam","Ara Öğün"].map(t=>(
                  <button key={t} onClick={()=>setMealType(t)} style={{...btn(mealType===t?"linear-gradient(135deg,#6c63ff,#a29bfe)":"rgba(255,255,255,0.07)"),whiteSpace:"nowrap",flexShrink:0}}>{t}</button>
                ))}
              </div>
              <button style={btn("linear-gradient(135deg,#6c63ff,#ff6b6b)",true,{marginBottom:9})} onClick={()=>setModal("food")}>+ Yemek Ekle</button>
              {["Kahvaltı","Öğle","Akşam","Ara Öğün"].map(type=>{
                const grp=meals.filter(m=>m.mealType===type);
                if(!grp.length) return null;
                return (
                  <div key={type} style={card()}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                      <div style={{fontSize:13,fontWeight:800}}>{type}</div>
                      <div style={{fontSize:12,color:C.cal,fontWeight:700}}>{grp.reduce((a,m)=>a+m.cal,0)} kcal</div>
                    </div>
                    {grp.map(m=>(
                      <div key={m.uid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.name}</div>
                          <div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>P:{m.p}g · K:{m.c}g · Y:{m.f}g</div>
                        </div>
                        <div style={{display:"flex",gap:7,alignItems:"center",flexShrink:0}}>
                          <span style={{fontWeight:800,color:C.cal,fontSize:12}}>{m.cal}</span>
                          <button onClick={()=>setMeals(ms=>ms.filter(x=>x.uid!==m.uid))} style={{background:"rgba(255,107,107,.15)",border:"none",borderRadius:6,padding:"3px 7px",cursor:"pointer",color:C.cal,fontSize:11}}>✕</button>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>}

            {/* WATER */}
            {tab==="water" && <div className="pg">
              <div style={card({textAlign:"center",background:"linear-gradient(135deg,rgba(116,185,255,.12),rgba(108,99,255,.07))"})}>
                <div style={{display:"flex",justifyContent:"center",marginBottom:8}}>
                  <Ring value={water} max={T.water} size={120} sw={12} color={C.w}>
                    <div style={{fontSize:20,fontWeight:900}}>{(water/1000).toFixed(2)}L</div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:2}}>/ {T.water/1000}L hedef</div>
                  </Ring>
                </div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.45)"}}>{water>=T.water?"🎉 Günlük hedefe ulaştın!":`${T.water-water}ml daha içmelisin`}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:9}}>
                {[["☕ 1 Bardak","200ml",200],["🥤 Büyük Bardak","300ml",300],["🍶 500ml Şişe","500ml",500],["🫙 1 Litre","1000ml",1000]].map(([label,sub,ml])=>(
                  <button key={ml} onClick={()=>addWater(ml)} style={{...btn("rgba(116,185,255,.1)",true,{border:"1px solid rgba(116,185,255,.22)",textAlign:"left",padding:"10px 12px"})}}>
                    <div style={{fontSize:12}}>{label}</div>
                    <div style={{fontSize:11,color:C.w,fontWeight:700,marginTop:2}}>{sub}</div>
                  </button>
                ))}
              </div>
              <div style={card()}>
                <div style={{fontSize:13,fontWeight:800,marginBottom:9}}>🔢 Miktar Gir (ml)</div>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...inp(),flex:1}} placeholder="Örn: 350" type="number" value={mlInput} onChange={e=>setMlInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustomWater()}/>
                  <button style={btn("linear-gradient(135deg,#74b9ff,#6c63ff)",false,{flexShrink:0})} onClick={addCustomWater}>Ekle</button>
                </div>
              </div>
              <div style={card()}>
                <div style={{fontWeight:800,marginBottom:8,fontSize:13}}>Bugün içilenler</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {water>0?Array.from({length:Math.min(Math.floor(water/200),25)},(_,i)=><span key={i} style={{fontSize:18}}>💧</span>)
                    :<div style={{color:"rgba(255,255,255,0.2)",fontSize:12}}>Henüz su içilmedi</div>}
                </div>
                {water>0&&<button onClick={()=>{setWater(0);showToast("Su sıfırlandı");}} style={btn("rgba(255,107,107,.15)",true,{marginTop:9,border:"1px solid rgba(255,107,107,.22)",fontSize:12})}>Sıfırla</button>}
              </div>
            </div>}

            {/* WEIGHT */}
            {tab==="weight" && <div className="pg">
              <div style={card({background:"linear-gradient(135deg,rgba(78,205,196,.11),rgba(108,99,255,.07))"})}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:9}}>
                  <div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:2}}>Güncel kilo</div>
                    <div style={{fontSize:38,fontWeight:900,lineHeight:1}}>{lastKg}<span style={{fontSize:14,color:"rgba(255,255,255,0.35)"}}>kg</span></div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>BMI</div>
                    <div style={{fontSize:18,fontWeight:900,color:C.p}}>{(lastKg/(USER.height/100)**2).toFixed(1)}</div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>{(()=>{const b=lastKg/(USER.height/100)**2;return b<18.5?"Zayıf":b<25?"Normal":b<30?"Fazla":"Obez";})()}</div>
                  </div>
                </div>
                <Spark data={wHist} color={C.p} h={52}/>
                {wHist.length>1&&<div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10,color:"rgba(255,255,255,0.3)"}}>
                  <span>İlk: {wHist[0]}kg</span>
                  <span style={{color:wHist[wHist.length-1]>wHist[0]?C.p:C.cal}}>{wHist[wHist.length-1]>wHist[0]?"▲":"▼"} {Math.abs(wHist[wHist.length-1]-wHist[0]).toFixed(1)}kg</span>
                </div>}
              </div>
              <button style={btn("linear-gradient(135deg,#4ecdc4,#6c63ff)",true,{marginBottom:9})} onClick={()=>setModal("weight")}>+ Kilo Kaydet</button>
              <div style={card()}>
                <div style={{fontWeight:800,marginBottom:9,fontSize:13}}>Geçmiş</div>
                {wLog.length===0
                  ?<div style={{textAlign:"center",padding:"14px 0",color:"rgba(255,255,255,0.2)",fontSize:12}}>Henüz kilo girilmedi ⚖️</div>
                  :[...wLog].reverse().slice(0,8).map((w,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <span style={{fontSize:12,color:"rgba(255,255,255,0.45)"}}>{w.date}</span>
                      <span style={{fontSize:13,fontWeight:800,color:C.p}}>{w.val} kg</span>
                    </div>
                  ))
                }
              </div>
              <div style={card()}>
                <div style={{fontWeight:800,marginBottom:9,fontSize:13}}>Vücut Bilgileri</div>
                {[["Boy","173 cm"],["Yaş","18"],["BMR","~1.650 kcal"],["TDEE","~2.270 kcal"],["Hedef Kalori","2.570 kcal"],["Hedef Protein","177g / gün"]].map(([k,v])=>(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                    <span style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>{k}</span>
                    <span style={{fontSize:12,fontWeight:700}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>}

            {/* WORKOUT */}
            {tab==="workout" && <div className="pg">
              <div style={card({background:"linear-gradient(135deg,rgba(162,155,254,.12),rgba(255,107,107,.07))"})}>
                <div style={{fontSize:15,fontWeight:900,marginBottom:2}}>Bugünkü Antrenman 💪</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{workouts.length} egzersiz</div>
              </div>
              <div style={card()}>
                <div style={{fontWeight:800,marginBottom:9,fontSize:13}}>Egzersiz Ekle</div>
                <input style={{...inp(),marginBottom:8}} placeholder="Egzersiz adı (örn: Bench Press)" value={wo.name} onChange={e=>setWo(p=>({...p,name:e.target.value}))}/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:9}}>
                  {[["Set","sets"],["Tekrar","reps"],["kg","weight"]].map(([ph,k])=>(
                    <input key={k} style={inp()} placeholder={ph} type="number" value={wo[k]} onChange={e=>setWo(p=>({...p,[k]:e.target.value}))}/>
                  ))}
                </div>
                <button style={btn("linear-gradient(135deg,#a29bfe,#6c63ff)",true)} onClick={addWo}>+ Kaydet</button>
              </div>
              {workouts.length===0
                ?<div style={card({textAlign:"center",padding:"24px 0",color:"rgba(255,255,255,0.2)",fontSize:12})}>Bugün henüz egzersiz yok 🏋️</div>
                :<div style={card()}>
                  <div style={{fontWeight:800,marginBottom:9,fontSize:13}}>Egzersizler</div>
                  {workouts.map(w=>(
                    <div key={w.uid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:700}}>{w.name}</div>
                        <div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{w.time}</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{textAlign:"right"}}>
                          {w.sets&&<div style={{fontSize:12,fontWeight:700,color:C.f}}>{w.sets}×{w.reps}</div>}
                          {w.weight&&<div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{w.weight}kg</div>}
                        </div>
                        <button onClick={()=>setWorkouts(ws=>ws.filter(x=>x.uid!==w.uid))} style={{background:"rgba(255,107,107,.15)",border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",color:C.cal,fontSize:11}}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              }
            </div>}

            <div style={{height:20}}/>
          </div>

          {/* FOOD MODAL */}
          {modal==="food" && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",zIndex:100,display:"flex",alignItems:"flex-end",backdropFilter:"blur(4px)"}} onClick={()=>setModal(null)}>
              <div style={{background:"#181828",borderRadius:"18px 18px 0 0",padding:`16px 13px calc(24px + ${safeBot})`,width:"100%",maxHeight:"90vh",overflowY:"auto",maxWidth:390,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:16,fontWeight:900}}>Yemek Ekle</div>
                  <button onClick={()=>setModal(null)} style={btn("rgba(255,255,255,.09)",false,{fontSize:12})}>✕</button>
                </div>
                <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto"}}>
                  {["Kahvaltı","Öğle","Akşam","Ara Öğün"].map(t=>(
                    <button key={t} onClick={()=>setMealType(t)} style={{...btn(mealType===t?"linear-gradient(135deg,#6c63ff,#a29bfe)":"rgba(255,255,255,.07)"),whiteSpace:"nowrap",flexShrink:0}}>{t}</button>
                  ))}
                </div>
                <input style={{...inp(),marginBottom:9}} placeholder="🔍 Yemek ara..." value={search} onChange={e=>setSearch(e.target.value)}/>
                <div style={{display:"flex",gap:5,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
                  {["Tümü",...CATS].map(c=>(
                    <button key={c} onClick={()=>setSelCat(c)} style={{...btn(selCat===c?"rgba(162,155,254,.3)":"rgba(255,255,255,.06)"),whiteSpace:"nowrap",flexShrink:0,fontSize:11,padding:"6px 10px"}}>{c}</button>
                  ))}
                </div>
                <div style={{maxHeight:220,overflowY:"auto",marginBottom:13}}>
                  {filtered.length===0
                    ?<div style={{textAlign:"center",padding:"18px 0",color:"rgba(255,255,255,0.25)",fontSize:12}}>Sonuç bulunamadı</div>
                    :filtered.map(f=>(
                      <div key={f.id} onClick={()=>addFood(f)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.06)",cursor:"pointer"}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.name}</div>
                          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)"}}>P:{f.p}g · K:{f.c}g · Y:{f.f}g</div>
                        </div>
                        <div style={{fontSize:13,fontWeight:900,color:C.cal,flexShrink:0,marginLeft:8}}>{f.cal} kcal</div>
                      </div>
                    ))
                  }
                </div>
                <div style={{borderTop:"1px solid rgba(255,255,255,.07)",paddingTop:13}}>
                  <div style={{fontWeight:800,marginBottom:9,fontSize:12}}>Özel Yemek Ekle</div>
                  <input style={{...inp(),marginBottom:7}} placeholder="Yemek adı" value={custom.name} onChange={e=>setCustom(p=>({...p,name:e.target.value}))}/>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:9}}>
                    {[["Kcal","cal"],["Pro","p"],["Karb","c"],["Yağ","f"]].map(([ph,k])=>(
                      <input key={k} style={inp()} placeholder={ph} type="number" value={custom[k]} onChange={e=>setCustom(p=>({...p,[k]:e.target.value}))}/>
                    ))}
                  </div>
                  <button style={btn("linear-gradient(135deg,#ff6b6b,#ffd93d)",true)} onClick={addCustomFood}>Özel Yemek Ekle</button>
                </div>
              </div>
            </div>
          )}

          {/* WEIGHT MODAL */}
          {modal==="weight" && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",zIndex:100,display:"flex",alignItems:"flex-end",backdropFilter:"blur(4px)"}} onClick={()=>setModal(null)}>
              <div style={{background:"#181828",borderRadius:"18px 18px 0 0",padding:`20px 14px calc(40px + ${safeBot})`,width:"100%",maxWidth:390,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                  <div style={{fontSize:16,fontWeight:900}}>Kilo Kaydet ⚖️</div>
                  <button onClick={()=>setModal(null)} style={btn("rgba(255,255,255,.09)",false,{fontSize:12})}>✕</button>
                </div>
                <input style={{...inp({fontSize:26,textAlign:"center",fontWeight:900,marginBottom:14,padding:"13px"})}}
                  placeholder={`${lastKg}`} type="number" step="0.1" value={newKg} onChange={e=>setNewKg(e.target.value)}/>
                <button style={btn("linear-gradient(135deg,#4ecdc4,#6c63ff)",true)} onClick={logKg}>Kaydet</button>
              </div>
            </div>
          )}

          {/* BOTTOM NAV */}
          <div style={{background:"rgba(10,10,20,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",paddingBottom:`calc(5px + ${safeBot})`,flexShrink:0}}>
            {TABS.map(t=>(
              <button key={t.id} style={navS(tab===t.id)} onClick={()=>setTab(t.id)}>
                <svg width={19} height={19} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.9} strokeLinecap="round" strokeLinejoin="round"><path d={t.icon}/></svg>
                <span style={{fontSize:9,fontWeight:700}}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
